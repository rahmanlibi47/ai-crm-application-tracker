services:
  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    ports:
      - "8001:8001"
    env_file:
      - ./services/auth-service/.env.docker
    depends_on:
      - auth-postgres

  job-tracker-redis:
    image: redis:7
    container_name: job-tracker-redis
    ports:
      - "6379:6379"

  application-service:
    build:
      context: ./services/application-service
    container_name: application-service
    ports:
      - "8002:8002"
    env_file:
      - ./services/application-service/.env.docker
    depends_on:
      - auth-postgres
      - job-tracker-redis

  rabbitmq:
    image: rabbitmq:3-management
    container_name: careerledger-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  auth_postgres_data: